<html>
  <head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Luz puntual tipo foco -->
      <a-light type="spot" color="#ffffff" intensity="1"
               position="0 4 -3" angle="30" penumbra="0.5"
               target="#targetBox"></a-light>

      <!-- Caja objetivo -->
      <a-box id="targetBox" position="0 1 -3" rotation="0 45 0" color="#FFC65D"></a-box>
      <a-plane rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
